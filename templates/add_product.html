{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-start min-h-screen pt-24">

    <div class="w-full max-w-2xl bg-black/40 backdrop-blur-xl 
                border border-gray-800 rounded-2xl shadow-2xl p-10">

        <h2 class="text-3xl font-bold mb-8 text-center 
                   bg-gradient-to-r from-cyan-400 to-purple-500 
                   bg-clip-text text-transparent">
            เพิ่มสินค้าใหม่
        </h2>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">

            <!-- ชื่อสินค้า -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">ชื่อสินค้า</span>
                </label>
                <input type="text" name="name" required
                       class="input input-bordered w-full bg-black/50 border-gray-700 focus:border-cyan-500" />
            </div>

            <!-- ราคา -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">ราคา (บาท)</span>
                </label>
                <input type="number"
                    name="price"
                    step="any"
                    min="0"
                    required
                    class="input input-bordered w-full bg-black/50 border-gray-700">
            </div>

            <!-- จำนวน Stock -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">จำนวน Stock</span>
                </label>
                <input type="number" name="stock" required
                       class="input input-bordered w-full bg-black/50 border-gray-700 focus:border-pink-500" />
            </div>

            <!-- อัปโหลดรูป -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">อัปโหลดรูปภาพ</span>
                </label>
                <input type="file" name="image"
                       class="file-input file-input-bordered w-full bg-black/50 border-gray-700" />
            </div>

            <!-- หมวดหมู่ -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">หมวดหมู่</span>
                </label>
                <select name="category_id"
                        class="select select-bordered w-full bg-black/50 border-gray-700 focus:border-cyan-500">
                    {% for category in categories %}
                    <option value="{{ category.id }}">
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="label">
                    <span class="label-text text-gray-300">ตำแหน่งภาพ</span>
                </label>

                <select name="image_position"
                        class="select select-bordered w-full bg-black/50 border-gray-700">
                    <option value="top">โฟกัสด้านบน</option>
                    <option value="center" selected>กึ่งกลาง</option>
                    <option value="bottom">โฟกัสด้านล่าง</option>
                </select>
            </div>

            <!-- ปุ่ม -->
            <div class="flex justify-between pt-6">

                <a href="{{ url_for('admin.admin_products') }}"
                   class="btn btn-outline border-gray-600 text-gray-300">
                    ยกเลิก
                </a>

                <button type="submit"
                        class="btn bg-gradient-to-r from-cyan-500 to-purple-600 
                               border-none text-white hover:opacity-90">
                    บันทึกสินค้า
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
