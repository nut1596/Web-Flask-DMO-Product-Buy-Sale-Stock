{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-start min-h-screen pt-24">

    <div class="w-full max-w-2xl bg-black/40 backdrop-blur-xl 
                border border-gray-800 rounded-2xl shadow-2xl p-10">

        <h2 class="text-3xl font-bold mb-8 text-center 
                   bg-gradient-to-r from-yellow-400 to-pink-500 
                   bg-clip-text text-transparent">
            แก้ไขสินค้า
        </h2>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">

            <!-- ชื่อสินค้า -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">ชื่อสินค้า</span>
                </label>
                <input type="text"
                       name="name"
                       value="{{ product.name }}"
                       required
                       class="input input-bordered w-full bg-black/50 border-gray-700 focus:border-cyan-500">
            </div>

            <!-- ราคา -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">ราคา (บาท)</span>
                </label>
                <input type="number"
                       name="price"
                       value="{{ product.price }}"
                       step="any"
                       min="0"
                       required
                       class="input input-bordered w-full bg-black/50 border-gray-700 focus:border-purple-500">
            </div>

            <!-- จำนวน Stock -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">จำนวน Stock</span>
                </label>
                <input type="number"
                       name="stock"
                       value="{{ product.stock }}"
                       min="0"
                       required
                       class="input input-bordered w-full bg-black/50 border-gray-700 focus:border-pink-500">
            </div>

            <!-- รูปปัจจุบัน -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">รูปปัจจุบัน</span>
                </label>

                <div class="flex items-center gap-6">
                    <img id="previewImage"
                        src="{{ url_for('static', filename='images/' + product.image) }}"
                        class="w-28 h-28 object-cover rounded-lg border border-gray-700">

                    <div class="flex flex-col gap-2">
                        <span class="text-gray-400 text-sm">
                            {{ product.image }}
                        </span>

                        <!-- อัปโหลดรูปใหม่ -->
                        <input type="file"
                            name="image"
                            accept="image/*"
                            onchange="previewFile(event)"
                            class="file-input file-input-bordered bg-black/50 border-gray-700 w-full">
                    </div>
                </div>
            </div>

            <!-- หมวดหมู่ -->
            <div>
                <label class="label">
                    <span class="label-text text-gray-300">หมวดหมู่</span>
                </label>
                <select name="category_id"
                        class="select select-bordered w-full bg-black/50 border-gray-700 focus:border-cyan-500">
                    {% for c in categories %}
                    <option value="{{ c.id }}"
                        {% if c.id == product.category_id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="text-gray-400 text-sm">ตำแหน่งภาพ</label>
                <select name="image_position"
                        class="select select-bordered w-full mt-2
                               bg-black/50 border-gray-700 focus:border-orange-500">
                    <option value="top"
                        {% if product.image_position == "top" %}selected{% endif %}>
                        โฟกัสด้านบน
                    </option>
                    <option value="center"
                        {% if product.image_position == "center" %}selected{% endif %}>
                        กึ่งกลาง
                    </option>
                    <option value="bottom"
                        {% if product.image_position == "bottom" %}selected{% endif %}>
                        โฟกัสด้านล่าง
                    </option>
                </select>
            </div>

            <!-- ปุ่ม -->
            <div class="flex justify-between pt-6">

                <a href="{{ url_for('admin.admin_products') }}"
                   class="btn btn-outline border-gray-600 text-gray-300">
                    ยกเลิก
                </a>

                <button type="submit"
                        class="btn bg-gradient-to-r from-yellow-500 to-pink-600 
                               border-none text-white hover:opacity-90">
                    บันทึกการแก้ไข
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
