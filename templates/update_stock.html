{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto bg-black/60 p-8 rounded-2xl border border-gray-800 shadow-xl">

    <h2 class="text-2xl font-bold mb-6">
        เพิ่มสต็อกสินค้า
    </h2>

    <p class="mb-4 text-gray-400">
        สินค้า: <span class="text-white font-semibold">{{ product.name }}</span>
    </p>

    <p class="mb-6">
        สต็อกปัจจุบัน: 
        <span class="text-green-400 font-bold">
            {{ product.stock }}
        </span>
    </p>

    <form method="POST" class="space-y-4">

        <div>
            <label class="text-sm text-gray-400">จำนวนที่ต้องการเพิ่ม</label>
            <input type="number"
                   name="add_stock"
                   min="1"
                   required
                   class="input input-bordered w-full bg-black border-gray-700">
        </div>

        <button class="btn bg-gradient-to-r from-cyan-500 to-purple-600 border-none w-full text-white">
            บันทึก
        </button>

    </form>

</div>

{% endblock %}
